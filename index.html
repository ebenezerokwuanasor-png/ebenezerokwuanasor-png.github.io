<script>
function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("open"); }
function closeOverlay(id){ document.getElementById(id).style.display="none"; }
function toggleTheme(){ darkTheme=!darkTheme; document.body.style.background=darkTheme?"#222":"#f2f2f2"; }
function togglePassword(){ let p=document.getElementById("adminPass"); p.type=p.type==="password"?"text":"password"; }

function adminClick(){
if(admin) document.getElementById("adminPanel").style.display="flex";
else document.getElementById("adminLogin").style.display="flex";
}

// ✅ Supabase Login
async function adminLogin(){
try{
let email=document.getElementById("adminEmail").value;
let pass=document.getElementById("adminPass").value;

const { error } = await db.auth.signInWithPassword({
email: email,
password: pass
});

if(error) throw error;

admin=true;
closeOverlay("adminLogin");
document.getElementById("adminPanel").style.display="flex";
alert("✅ Login successful!");
}catch(e){
alert("❌ " + e.message);
}
}

// Logout
async function adminLogout(){
await db.auth.signOut();
admin=false;
closeOverlay("adminPanel");
alert("✅ Logged out!");
}

function openContact(){ document.getElementById("contactOverlay").style.display="flex"; }

// Upload
async function uploadFile(file,bucket){
let name=Date.now()+"_"+file.name;
await db.storage.from(bucket).upload(name,file);
return SUPABASE_URL+"/storage/v1/object/public/"+bucket+"/"+name;
}

// Create Post
async function createPost(){
if(!admin) return alert("Admin only!");
let title=document.getElementById("postTitle").value;
let body=document.getElementById("postBody").value;

if(!title.trim() || !body.trim()) return alert("❌ Fill all fields");

let file=document.getElementById("mediaFile").files[0];
let url=document.getElementById("mediaURL").value;

let media = file ? await uploadFile(file,MEDIA_BUCKET) : url;

await db.from("posts").insert({title,body,media,type:"post"});
loadPosts();
alert("✅ Post uploaded!");
}

// Delete
async function deletePost(){
let id=prompt("Enter Post ID");
if(!id) return;
await db.from("posts").delete().eq("id",id);
loadPosts();
alert("✅ Deleted!");
}

// Favicon
async function changeFavicon(){
if(!admin) return alert("Admin only!");
let input=document.createElement("input");
input.type="file";
input.accept="image/png";
input.onchange=async ()=>{
let file=input.files[0];
let url=await uploadFile(file,FAVICON_BUCKET);
document.getElementById("faviconTag").href=url;
alert("✅ Favicon updated!");
};
input.click();
}

// Load Posts
async function loadPosts(){
let {data} = await db.from("posts").select("*").order("id",{ascending:false});
let container=document.getElementById("posts");
container.innerHTML="";
data.forEach(p=>{
let media = p.media ? (p.media.match(/\.(mp4|webm)$/)? `<video controls src="${p.media}"></video>`:`<img src="${p.media}">`) : "";
container.innerHTML+=`
<div class="post">
<h3>${p.title}</h3>
<p>${p.body}</p>
${media}
<div>Post ID: ${p.id}</div>
</div>`;
});
}

loadPosts();
</script>
