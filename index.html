<style>
body { margin:0; font-family:Arial,sans-serif; background:#f2f2f2; overflow-y:scroll;}
.banner { padding:25px 20px; text-align:center; font-size:26px; font-weight:bold; color:white; background:linear-gradient(45deg,#ff6a00,#ee0979,#00c6ff,#ff00ff); background-size:400% 400%; animation: gradient 12s ease infinite; box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.banner i { display:block; font-size:16px; font-style:italic; color:#ffe4e1; margin-top:5px;}
@keyframes gradient {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.menu { font-size:22px; padding:6px; cursor:pointer; position:fixed; top:10px; left:10px; z-index:20; border:none; border-radius:50%; background:linear-gradient(45deg,#ff6a00,#00c6ff,#ee0979,#ff00ff); color:white; transition:0.3s;}
.menu:hover { transform:scale(1.1);}
.sidebar { width:250px; height:100vh; background:#111; color:white; position:fixed; left:-300px; top:0; transition:0.3s; padding:20px; z-index:15; overflow-y:auto;}
.sidebar.open { left:0;}
.sidebar img { width:100px; height:100px; border-radius:50%; display:block; margin:auto;}
.sidebar button { width:100%; margin-top:10px; padding:10px; border:none; background:#333; color:white; cursor:pointer; border-radius:6px; font-weight:bold; transition:0.3s;}
.sidebar button:hover { background:#555; transform:scale(1.03);}
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:25; }
.box { background:white; padding:30px; width:90%; max-width:550px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,.3); position:relative;}
.closeBtn { position:absolute; top:10px; right:15px; cursor:pointer; font-weight:bold; font-size:18px;}
input,textarea { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;}
button.actionBtn { padding:10px 15px; margin-top:10px; border:none; border-radius:6px; background:#ff6a00; color:white; cursor:pointer; font-weight:bold; transition:0.3s;}
button.actionBtn:hover { background:#ee0979;}
.post { background:white; margin:20px; padding:15px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.1); animation: fadeIn 0.5s ease;}
.post img, .post video { max-width:100%; border-radius:8px; margin-top:10px;}
.post .meta { font-size:12px; color:#555; margin-top:5px;}
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
</style>

<body>

<div class="banner">Ebenezer.com
<i>The Official Website of Okwuanasor Ebenezer Onyekachukwu</i></div>

<div class="sidebar" id="sidebar">
<img src="favicon.png" onclick="changeFavicon()">
<button onclick="adminClick()">Admin</button>
<button onclick="openContact()">Contact</button>
<button onclick="toggleTheme()">Theme</button>
</div>

<div id="posts"></div>

<!-- ADMIN LOGIN -->
<div class="overlay" id="adminLogin">
<div class="box">
<span class="closeBtn" onclick="closeOverlay('adminLogin')">X</span>
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email">
<div style="position:relative;">
<input id="adminPass" type="password" placeholder="Password">
<button style="position:absolute; right:5px; top:5px;" onclick="togglePassword()">👁️</button>
</div>
<button class="actionBtn" onclick="adminLogin()">Login</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="adminPanel">
<div class="box">
<span class="closeBtn" onclick="closeOverlay('adminPanel')">X</span>
<h3>Admin Panel</h3>
<input id="postTitle" placeholder="Post Title">
<textarea id="postBody" placeholder="Post Content"></textarea>
<input type="file" id="mediaFile">
<input id="mediaURL" placeholder="Optional File URL">
<button class="actionBtn" onclick="createPost()">Publish Post</button>
<button class="actionBtn" onclick="deletePost()">Delete Post</button>
<button class="actionBtn" onclick="changeFavicon()">Change Favicon</button>
<button class="actionBtn" onclick="adminLogout()">Logout</button>
</div>
</div>

<!-- CONTACT -->
<div class="overlay" id="contactOverlay">

<h3>Contact</h3>
<p>Email: ebenezerokwuanasor@gmail.com</p>
<p>WhatsApp: 09045825791</p>
</div>
</div>

<script>
function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("open"); }
function closeOverlay(id){ document.getElementById(id).style.display="none"; }
function toggleTheme(){ darkTheme=!darkTheme; document.body.style.background = darkTheme ? "#222":"#f2f2f2"; }
function togglePassword(){ let p=document.getElementById("adminPass"); p.type=p.type==="password"?"text":"password"; }

function adminClick(){ if(admin) document.getElementById("adminPanel").style.display="flex"; else document.getElementById("adminLogin").style.display="flex"; }

async function adminLogin(){
let lockedUntil = localStorage.getItem("adminLocked");
if(lockedUntil && Date.now()<lockedUntil){ return alert("❌ Admin locked. Try again later."); }
try{
let email=document.getElementById("adminEmail").value;
let pass=document.getElementById("adminPass").value;
if(!email || !pass) return alert("❌ Enter both email and password.");
await login(auth,email,pass);
admin=true;
loginAttempts=0; localStorage.removeItem("adminAttempts"); localStorage.removeItem("adminLocked");
closeOverlay('adminLogin');
document.getElementById("adminPanel").style.display="flex";
document.getElementById("adminEmail").value="";
document.getElementById("adminPass").value="";
loadPosts();
alert("✅ Login successful!");
}catch(err){
loginAttempts++;
localStorage.setItem("adminAttempts",loginAttempts);
if(loginAttempts>=5){ localStorage.setItem("adminLocked", Date.now()+24*60*60*1000); return alert("❌ Admin locked. Try again in 24hrs."); }
alert("❌ Login failed: "+err.message);}
}

async function adminLogout(){ await logout(auth); admin=false; closeOverlay('adminPanel'); alert("✅ Logged out successfully!"); }

function openContact(){ document.getElementById("contactOverlay").style.display="flex"; }

async function uploadFile(file,bucket=MEDIA_BUCKET){
if(!file) return "";
try{
let name=Date.now()+"_"+file.name;
await db.storage.from(bucket).upload(name,file);
return SUPABASE_URL+"/storage/v1/object/public/"+bucket+"/"+name;
}catch(e){ alert("❌ File upload failed!"); return null;}
}

async function createPost(){
if(!admin) return alert("Admin only!");
let title=document.getElementById("postTitle").value;
let body=document.getElementById("postBody").value;
if(!title.trim() || !body.trim()) return alert("❌ Title and content cannot be empty.");
let file=document.getElementById("mediaFile").files[0];
let url=document.getElementById("mediaURL").value;
let media = file ? await uploadFile(file) : url;
if(file && !media) return; // stop if upload failed
await db.from("posts").insert({title,body,media,type:"post",likes:0});
document.getElementById("postTitle").value="";
document.getElementById("postBody").value="";
document.getElementById("mediaFile").value="";
document.getElementById("mediaURL").value="";
loadPosts();
alert("✅ Post uploaded successfully!");
}

async function deletePost(){
if(!admin) return alert("Admin only!");
let id=prompt("Enter Post ID to delete");
if(!id) return;
let {data} = await db.from("posts").select("*").eq("id",id).single();
if(!data) return alert("❌ Post ID not found");
await db.from("posts").delete().eq("id",id);
loadPosts();
alert("✅ Post deleted successfully!");
}

async function changeFavicon(){
if(!admin) return alert("Admin only!");
let fileInput=document.createElement("input");
fileInput.type="file"; fileInput.accept="image/png";
fileInput.onchange=async ()=>{
let file=fileInput.files[0];
if(file.width!==128 || file.height!==128) return alert("❌ Favicon must be 128x128!");
let url=await uploadFile(file,FAVICON_BUCKET);
document.getElementById("faviconTag").href=url;
alert("✅ Favicon updated!");
};
fileInput.click();
}

async function loadPosts(){
let {data} = await db.from("posts").select("*").eq("type","post").order("id",{ascending:false});
let container=document.getElementById("posts"); container.innerHTML="";
data.forEach(p=>{
let media = p.media ? (p.media.match(/\.(mp4|webm)$/)? `<video controls src="${p.media}"></video>` : `<img src="${p.media}">`) : "";
container.innerHTML+=`
<div class="post">
<h3>${p.title}</h3>
<p>${p.body}</p>
${media}
<div class="meta">Post ID: ${p.id}</div>
</div>`;
});
}
loadPosts();
</script>
</body>
