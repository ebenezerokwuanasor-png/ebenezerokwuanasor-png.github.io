<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ebenezer.com</title>

<meta name="description" content="Official website of Okwuanasor Ebenezer Onyekachukwu">
<meta name="author" content="Okwuanasor Ebenezer">

<link id="faviconTag" rel="icon" href="favicon.png">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- HEADER -->
<button class="menu" onclick="toggleSidebar()">☰</button>

<div class="banner">
Ebenezer.com
<i>The Official Website of Okwuanasor Ebenezer Onyekachukwu</i>
</div>

<!-- SEARCH -->
<div class="search-bar">
<input id="searchInput" placeholder="Search posts...">
<button onclick="searchPosts()">Search</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<img id="sidebarFavicon" src="favicon.png">

<button onclick="adminClick()">Admin</button>
<button onclick="openContact()">Contact</button>
<button onclick="toggleTheme()">Theme</button>

<button onclick="openAbout()">About</button>
<button onclick="openPrivacy()">Privacy</button>
<button onclick="openTerms()">Terms</button>
<button onclick="watchAds()">Watch Ads</button>

</div>

<!-- POSTS -->
<div id="posts"></div>

<!-- ADS -->
<div class="overlay adOverlay" id="adOverlay">
  <div class="box">
    <span class="closeBtn" onclick="closeAds()">X</span>
    <div id="adContainer"></div>
  </div>
</div>

<!-- ABOUT -->
<div class="overlay" id="aboutOverlay">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('aboutOverlay')">X</span>
    <h3>About</h3>
    <p>Official content platform.</p>
  </div>
</div>

<!-- PRIVACY -->
<div class="overlay" id="privacyOverlay">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('privacyOverlay')">X</span>
    <h3>Privacy</h3>
    <p>Your data is safe.</p>
  </div>
</div>

<!-- TERMS -->
<div class="overlay" id="termsOverlay">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('termsOverlay')">X</span>
    <h3>Terms</h3>
    <p>Use responsibly.</p>
  </div>
</div>

<!-- CONTACT -->
<div class="overlay" id="contactOverlay">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('contactOverlay')">X</span>
    <p>Email: ebenezerokwuanasor@gmail.com</p>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="overlay" id="adminLogin">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('adminLogin')">X</span>

    <h3>Admin Login</h3>

    <input id="adminEmail" placeholder="Email">

    <div style="position:relative;">
      <input id="adminPass" type="password" placeholder="Password">
      <button onclick="togglePassword()">👁️</button>
    </div>

    <button onclick="adminLogin()">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="adminPanel">
  <div class="box">
    <span class="closeBtn" onclick="closeOverlay('adminPanel')">X</span>

    <h3>Admin Panel</h3>

    <input id="postTitle" placeholder="Post Title">
    <textarea id="postBody" placeholder="Post Content"></textarea>

    <input type="file" id="mediaFile">
    <input id="mediaURL" placeholder="Optional URL">

    <button onclick="createPost()">Publish</button>
    <button onclick="deletePost()">Delete</button>
    <button onclick="changeFavicon()">Upload Favicon</button>
    <button onclick="adminLogout()">Logout</button>
  </div>
</div>

<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
